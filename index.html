<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shadow Shapes - Silhouette Quiz</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1299640300068792" crossorigin="anonymous"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { margin: 0; padding: 0; overflow: hidden; width: 100%; height: 100%; position: fixed; touch-action: none; }
        body { background: #f3e5f5; font-family: 'Hiragino Sans', 'Meiryo', sans-serif; display: flex; flex-direction: column; }
        
        /* 上部広告：100px 固定 */
        #ad-top { width: 100%; height: 100px; background: #263238; display: flex; align-items: center; justify-content: center; flex-shrink: 0; z-index: 100; border-bottom: 3px solid #9c27b0; }

        /* ゲームエリア */
        #game-outer { flex-grow: 1; position: relative; width: 100%; background: #f3e5f5; overflow: hidden; }
        #main-container { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px; }
        
        #ui-layer { position: absolute; top: 15px; width: 100%; display: flex; justify-content: space-around; z-index: 10; }
        .ui-box { padding: 6px 18px; border-radius: 20px; font-weight: bold; font-size: 18px; color: #7b1fa2; background: white; box-shadow: 0 3px #ce93d8; }

        #target-display { font-size: 85px; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1)); transition: transform 0.2s; margin: 30px 0; }

        #choices { display: flex; gap: 15px; padding: 15px; justify-content: center; width: 100%; }
        .choice-btn { 
            width: 85px; height: 85px; background: #ffffff; 
            border-radius: 20px; display: flex; align-items: center; justify-content: center; 
            font-size: 42px; cursor: pointer; box-shadow: 0 5px #ce93d8; border: 2px solid #7b1fa2;
        }
        .choice-btn:active { transform: translateY(4px); box-shadow: none; }
        .silhouette { filter: brightness(0); }

        /* メニュー画面 */
        #menuScreen { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(255,255,255,0.97); display: flex; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 500; padding: 20px; 
        }

        /* 【収益】300x250 レクタングル */
        #ad-middle-box {
            width: 300px; height: 250px; background: #f5f5f5;
            margin: 15px 0; display: none; justify-content: center; align-items: center;
            border-radius: 12px; border: 1px solid #e1bee7; overflow: hidden;
        }

        .menu-btn-group { display: flex; flex-direction: column; align-items: center; width: 100%; gap: 15px; }
        .menu-btn { width: 270px; padding: 18px; font-size: 20px; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; text-decoration: none; text-align: center; transition: 0.2s; }
        #retry-btn { background: #9c27b0; color: white; box-shadow: 0 5px #7b1fa2; }
        #retry-btn:disabled { background: #ccc; box-shadow: none; color: #888; }
        .sub-btn { background: #ff4081; color: white; box-shadow: 0 5px #c2185b; font-size: 16px; }

        /* インタースティシャル */
        #inter-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 99999; align-items: center; justify-content: center; }
        .inter-content { width: 330px; height: 350px; background: #fff; position: relative; border-radius: 15px; }
        #close-ad-btn { position: absolute; top: -55px; right: 0; width: 45px; height: 45px; background: #333; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; border: 2px solid #fff; cursor: pointer; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="ad-top">
        <ins class="adsbygoogle" style="display:inline-block;width:320px;height:100px" data-ad-client="ca-pub-1299640300068792" data-ad-slot="3972022911"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

    <div id="game-outer">
        <div id="main-container">
            <div id="ui-layer">
                <div id="score-display" class="ui-box">SCORE: 0</div>
                <div id="timer-display" class="ui-box">TIME: 5.0</div>
            </div>
            
            <div id="target-display">❓</div>
            <div id="choices"></div>

            <div id="menuScreen">
                <h2 id="result-msg" style="color:#7b1fa2; margin: 5px 0; font-size: 32px;">Shadow Shapes</h2>
                <p id="sub-msg" style="margin:5px 0; font-size: 16px; color: #666; font-weight: bold; text-align: center; line-height: 1.4;">同じ形の「影」をタップ！<br>脳をフル回転させろ！</p>
                
                <div id="ad-middle-box">
                    <ins class="adsbygoogle" style="display:inline-block;width:300px;height:250px" data-ad-client="ca-pub-1299640300068792" data-ad-slot="9050127185"></ins>
                    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
                </div>

                <div class="menu-btn-group">
                    <button id="retry-btn" class="menu-btn" onclick="startNewGame()">★ スタート！ ★</button>
                    <a href="https://saaaachi.github.io/" class="sub-btn menu-btn">他のゲームで遊ぶ</a>
                </div>
            </div>

            <div id="inter-screen">
                <div class="inter-content">
                    <div id="close-ad-btn" onclick="closeInterAd()">5</div>
                    <iframe id="ifr-inter" src="about:blank" style="width:100%; height:100%; border:none; border-radius:15px; background:#fff;"></iframe>
                </div>
            </div>
        </div>
    </div>

    <script>
        let score = 0, gameActive = false, timeLeft = 5.0, timer, playCount = 0;
        const shapes = ['⭐', '❤️', '🌙', '☁️', '☀️', '🌸', '💎', '🍀', '🍎', '🐱', '🦋', '🐘', '🏠', '🚗', '🔔', '🏀'];
        let targetShape = "";

        const menuScreen = document.getElementById("menuScreen"),
              adMid = document.getElementById("ad-middle-box"),
              resultMsg = document.getElementById("result-msg"),
              retryBtn = document.getElementById("retry-btn"),
              targetDisplay = document.getElementById("target-display"),
              choicesDiv = document.getElementById("choices");

        function startNewGame() {
            menuScreen.style.display = "none";
            adMid.style.display = "none";
            score = 0; gameActive = true;
            nextLevel();
        }

        function nextLevel() {
            if(!gameActive) return;
            // スコアに応じて制限時間を短縮
            timeLeft = Math.max(1.0, 5.0 - (score * 0.15));
            updateUI();
            
            targetShape = shapes[Math.floor(Math.random() * shapes.length)];
            targetDisplay.innerText = targetShape;
            
            // ターゲットをランダムに回転させて難易度アップ
            const rotations = [0, 90, 180, 270];
            targetDisplay.style.transform = `rotate(${rotations[Math.floor(Math.random()*4)]}deg)`;

            choicesDiv.innerHTML = "";
            const currentChoices = [targetShape];
            while(currentChoices.length < 3) {
                const s = shapes[Math.floor(Math.random() * shapes.length)];
                if(!currentChoices.includes(s)) currentChoices.push(s);
            }
            currentChoices.sort(() => Math.random() - 0.5);

            currentChoices.forEach(s => {
                const btn = document.createElement("button");
                btn.className = "choice-btn";
                btn.innerHTML = `<span class="silhouette">${s}</span>`;
                btn.onpointerdown = (e) => { e.preventDefault(); check(s); };
                choicesDiv.appendChild(btn);
            });

            clearInterval(timer);
            timer = setInterval(() => {
                timeLeft -= 0.1;
                updateUI();
                if(timeLeft <= 0) gameOver("時間切れ！⏳");
            }, 100);
        }

        function check(s) {
            if(!gameActive) return;
            if(s === targetShape) {
                score++;
                nextLevel();
            } else {
                gameOver("形がちがうよ！😱");
            }
        }

        function updateUI() {
            document.getElementById("score-display").innerText = "SCORE: " + score;
            document.getElementById("timer-display").innerText = "TIME: " + Math.max(0, timeLeft).toFixed(1);
        }

        function gameOver(msg) {
            gameActive = false;
            playCount++;
            clearInterval(timer);

            resultMsg.innerText = "GAME OVER";
            document.getElementById("sub-msg").innerHTML = msg + "<br>SCORE: " + score;
            
            retryBtn.innerText = "お待ちください...";
            retryBtn.disabled = true;
            adMid.style.display = "flex";
            menuScreen.style.display = "flex";

            // 1.5秒の誤タップ防止ガード
            setTimeout(() => {
                retryBtn.disabled = false;
                retryBtn.innerText = "もう一度遊ぶ";
            }, 1500);

            // 3回ごとにインタースティシャル
            if (playCount % 3 === 0) {
                setTimeout(showInterAd, 500);
            }
        }

        function showInterAd() {
            const screen = document.getElementById("inter-screen"), 
                  closeBtn = document.getElementById("close-ad-btn"), 
                  ifr = document.getElementById('ifr-inter');
            ifr.src = './ad.large.html?v=' + Date.now();
            screen.style.display = "flex";
            let count = 5;
            closeBtn.innerText = count;
            closeBtn.style.pointerEvents = "none";
            const itv = setInterval(() => {
                count--;
                if(count > 0) closeBtn.innerText = count;
                else {
                    clearInterval(itv);
                    closeBtn.innerText = "×";
                    closeBtn.style.pointerEvents = "auto";
                }
            }, 1000);
        }

        function closeInterAd() {
            document.getElementById("inter-screen").style.display = "none";
            document.getElementById('ifr-inter').src = 'about:blank';
        }

        window.onload = () => { menuScreen.style.display = "flex"; };
    </script>
</body>
</html>
